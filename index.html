<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>תיקון אוטומטי לקובץ ששבש</title>
<style>
  body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% 0,#3a2115,#140805 62%,#070302);font-family:Arial,"Noto Sans Hebrew",sans-serif;color:#ffe7b0;display:grid;place-items:center;padding:20px;box-sizing:border-box}
  .box{width:min(720px,100%);background:linear-gradient(180deg,#422516,#1c0d08);border:1px solid rgba(255,231,176,.28);border-radius:26px;box-shadow:0 25px 80px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.08);padding:28px;text-align:center}
  h1{margin:0 0 10px;color:#fff;font-size:30px;text-shadow:0 2px 0 #000}
  p{line-height:1.55;margin:10px 0;color:#ffe7b0;font-size:16px}
  .card{margin-top:18px;border:1px solid rgba(246,199,108,.22);border-radius:18px;background:rgba(255,255,255,.055);padding:16px}
  input{width:100%;box-sizing:border-box;border:1px solid rgba(255,231,176,.28);border-radius:14px;background:#120704;color:#fff;padding:13px;font-size:15px}
  button{margin-top:14px;border:0;border-radius:15px;padding:13px 22px;color:#24130b;background:linear-gradient(180deg,#ffe7a8,#c98534);font-weight:900;cursor:pointer;box-shadow:0 5px 0 #6b3a18,0 12px 24px rgba(0,0,0,.35);font-size:16px}
  button:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.5)}
  .ok{color:#8cffb5;font-weight:900}.bad{color:#ff8b80;font-weight:900}.small{font-size:13px;opacity:.82}.log{margin-top:14px;text-align:right;white-space:pre-wrap;background:rgba(0,0,0,.25);border-radius:14px;padding:12px;min-height:40px;direction:rtl}
</style>
</head>
<body>
  <div class="box">
    <h1>🎲 תיקון אוטומטי למשחק</h1>
    <p>בחר את הקובץ <b>index.html האחרון</b> של המשחק, וזה יוריד לך קובץ מתוקן בשם <b>index.html</b>.</p>
    <p class="small">התיקון לא מוחק את השינויים הקיימים. הוא רק מוסיף תיקון תצוגה לחוקים וחוסם סיום תור מוקדם.</p>
    <div class="card">
      <input id="fileInput" type="file" accept=".html,text/html">
      <br>
      <button id="fixBtn" disabled>תקן והורד index.html</button>
      <div id="log" class="log">מחכה לקובץ...</div>
    </div>
  </div>
<script>
const input=document.getElementById('fileInput');
const btn=document.getElementById('fixBtn');
const log=document.getElementById('log');
let chosen=null;
input.addEventListener('change',()=>{chosen=input.files&&input.files[0];btn.disabled=!chosen;log.textContent=chosen?'נבחר: '+chosen.name:'מחכה לקובץ...';});
btn.addEventListener('click',async()=>{
  if(!chosen)return;
  let html=await chosen.text();
  const before=html.length;
  const notes=[];

  const finalCss=`\n\n/* תיקון סופי: תצוגת חוקים מלאה + מניעת סיום תור מוקדם */\n.side{gap:6px !important;overflow-y:auto !important;overflow-x:visible !important;padding-left:2px;scrollbar-width:thin}\n.card{padding:8px !important}\n.card h3{font-size:14px !important;margin-bottom:5px !important}\n.controls{gap:6px !important}\n.controls .btn{min-height:34px !important;padding:6px 8px !important;font-size:12px !important;border-radius:12px !important}\n.chatCard{flex:0 0 auto !important;padding:7px !important}\n.chatCard h3{font-size:14px !important;margin-bottom:5px !important}\n.reactions{gap:5px !important}\n.reactions .reactBtn{min-height:32px !important;line-height:1.08 !important;padding:5px 4px !important;font-size:10.5px !important;border-radius:11px !important}\n.rulesQuickCard{flex:0 0 auto !important;padding:7px !important}\n.rulesQuickCard h3{font-size:14px !important;margin-bottom:5px !important}\n.quickRules{grid-template-columns:repeat(2,minmax(0,1fr)) !important;gap:5px !important}\n.quickRule{grid-template-columns:46px minmax(0,1fr) !important;gap:4px !important;min-height:32px !important;padding:4px 5px !important;border-radius:10px !important}\n.quickRule span{font-size:10.5px !important;padding:2px 3px !important;border-radius:8px !important}\n.quickRule b{font-size:10.4px !important;line-height:1.08 !important;white-space:normal !important;overflow-wrap:anywhere}\n.logCard{min-height:65px !important;flex:1 1 70px !important}\n.log{font-size:11px !important;padding:6px !important}\n@media (max-height:760px) and (min-width:901px){\n  .side{gap:5px !important}\n  .card{padding:7px !important}\n  .controls .btn{min-height:31px !important;padding:5px 6px !important}\n  .reactions .reactBtn{min-height:29px !important;font-size:9.8px !important}\n  .quickRule{min-height:29px !important;padding:3px 5px !important}\n  .quickRule span{font-size:10px !important}\n  .quickRule b{font-size:9.8px !important}\n}\n@media (max-width:620px){.quickRules{grid-template-columns:1fr !important}.quickRule{grid-template-columns:62px 1fr !important}.reactions{grid-template-columns:1fr !important}}\n`;
  if(!html.includes('/* תיקון סופי: תצוגת חוקים מלאה + מניעת סיום תור מוקדם */')){
    if(html.includes('</style>')){html=html.replace('</style>',finalCss+'\n</style>');notes.push('✅ הוספתי עיצוב קומפקטי: כל החוקים נכנסים במשבצת.');}
    else notes.push('⚠️ לא מצאתי </style> ולכן לא הוספתי CSS.');
  } else notes.push('✅ עיצוב החוקים כבר קיים.');

  const canEndFunc=`function canEndTurnNow(){\n  const local=localActor();\n  if(!(state.currentActor===local&&state.status==='humanMoving'&&!state.gameOver&&!state.animating))return false;\n  if(state.remaining.length===0)return true;\n  const color=actorColor(local);\n  return getAllLegalMoves(state,color,state.remaining,state.freeMode).length===0;\n}\n`;
  if(!html.includes('function canEndTurnNow()')){
    if(html.includes('function renderUI(){')){html=html.replace('function renderUI(){',canEndFunc+'function renderUI(){');notes.push('✅ הוספתי בדיקה שמונעת סיום תור מוקדם.');}
    else notes.push('⚠️ לא מצאתי function renderUI ולכן לא הוספתי פונקציית בדיקה.');
  } else notes.push('✅ בדיקת סיום תור כבר קיימת.');

  const patterns=[
    [`els.endBtn.disabled=!(state.currentActor===local&&state.status==='humanMoving'&&!state.gameOver);`,`els.endBtn.disabled=!canEndTurnNow();`],
    [`els.endBtn.disabled=!(state.currentActor===local&&state.status==='humanMoving'&&!state.gameOver&&!state.animating);`,`els.endBtn.disabled=!canEndTurnNow();`]
  ];
  let disabledFixed=false;
  for(const [a,b] of patterns){if(html.includes(a)){html=html.replace(a,b);disabledFixed=true;break;}}
  notes.push(disabledFixed?'✅ הכפתור סיים תור יהיה כבוי עד שמותר לסיים.':'ℹ️ לא מצאתי את שורת disabled המדויקת, אולי כבר תוקנה.');

  const oldClick1=`els.endBtn.addEventListener('click',()=>{if(state.currentActor===localActor()&&state.status==='humanMoving')endTurn()});`;
  const oldClick2=`els.endBtn.addEventListener('click',()=>{if(state.currentActor===localActor()&&state.status==='humanMoving')endTurn();});`;
  const newClick=`els.endBtn.addEventListener('click',()=>{if(canEndTurnNow())endTurn();else if(state.currentActor===localActor()&&state.status==='humanMoving')showMessage('חייבים להשלים את כל המהלכים קודם',1600)});`;
  if(html.includes(oldClick1)){html=html.replace(oldClick1,newClick);notes.push('✅ חסמתי לחיצה על סיים תור לפני שכל המהלכים הסתיימו.');}
  else if(html.includes(oldClick2)){html=html.replace(oldClick2,newClick);notes.push('✅ חסמתי לחיצה על סיים תור לפני שכל המהלכים הסתיימו.');}
  else if(html.includes(`els.endBtn.addEventListener('click',()=>{if(canEndTurnNow())endTurn();`)) notes.push('✅ לחצן סיים תור כבר מוגן.');
  else notes.push('⚠️ לא מצאתי את מאזין הלחיצה המדויק של סיים תור.');

  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='index.html';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  log.innerHTML='<span class="ok">הקובץ ירד!</span>\n'+notes.join('\n')+`\n\nגודל לפני: ${before} תווים\nגודל אחרי: ${html.length} תווים`;
});
</script>
</body>
</html>
